<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <style>
        /* Estilos generales */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column; /* Para stacking en móviles */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background: #f0f0f0;
            position: relative;
        }

        /* Fondo animado */
        .area {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(to left, #8f94fb, #4e54c8);
        }

        .circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .circles li {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            animation: animate 25s linear infinite;
            bottom: -150px;
        }

        .circles li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .circles li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .circles li:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .circles li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .circles li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .circles li:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .circles li:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
        .circles li:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .circles li:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
        .circles li:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        /* Imagen */
        .image-container {
            width: 80%;
            max-width: 862px;
            height: 300px;
            background: url('img/CP.png') no-repeat center center;
            background-size: contain;
            margin-bottom: 20px;
        }

        /* Formulario */
        .form-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            width: 400px;
            max-width: 90%;
            box-sizing: border-box;
            z-index: 1;
            animation: fadeInUp 0.6s ease-in-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-top: 0;
            text-align: center;
            font-size: 28px;
            color: #333;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #007bff;
            outline: none;
        }

        input[type="submit"] {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: background-color 0.3s, transform 0.3s;
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        a {
            color: #ff6f00;
            text-decoration: none;
            transition: color 0.3s;
        }

        a:hover {
            color: #e64a19;
            text-decoration: underline;
        }

        p {
            text-align: center;
            margin-top: 20px;
            font-size: 16px;
        }

        /* Media Queries ajustadas para logo más grande */
        @media (max-width: 1024px) {
            .image-container { height: 350px; } /* antes 250px */
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .image-container { width: 90%; height: 300px; } /* antes 200px */
            .form-container { width: 90%; padding: 25px; }
        }

        @media (max-width: 480px) {
            .image-container { height: 250px; } /* antes 150px */
            .form-container { width: 95%; padding: 20px; }
            h2 { font-size: 24px; }
            input[type="submit"] { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="area">
        <ul class="circles">
            <li></li><li></li><li></li><li></li><li></li>
            <li></li><li></li><li></li><li></li><li></li>
        </ul>
    </div>

    <div class="image-container"></div>

    <div class="form-container">
        <h2>Iniciar Sesión</h2>
        <p id="error-message" class="error" style="display: none;"></p>
        <form action="php/login.php" method="post">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>

            <input type="submit" value="Iniciar Sesión">
        </form>
        <p>¿No tienes una cuenta? <a href="register.php">Regístrate aquí</a></p>
    </div>

    <script>
        // Función para obtener parámetros de la URL
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Mostrar mensaje de error si existe parámetro 'error'
        const error = getQueryParam('error');
        const errorMessage = document.getElementById('error-message');

        if (error) {
            if (error === 'incorrect_password') {
                errorMessage.textContent = 'Contraseña incorrecta';
            } else if (error === 'user_not_found') {
                errorMessage.textContent = 'No se encontró el usuario';
            }
            errorMessage.style.display = 'block';
        }
    </script>
</body>
</html>
